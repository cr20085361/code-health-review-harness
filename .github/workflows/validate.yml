name: Validate Harness

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify project structure
        shell: pwsh
        run: .\scripts\verify-project.ps1

      - name: Run smoke test
        shell: pwsh
        run: .\scripts\test-harness-smoke.ps1
